name: Build and Deploy Docker Images

# TODO: add linting
# TODO: do scan/linting before push, fail job if above treshold
# --> add matrix to build-deploy

on:
  workflow_call:
    inputs:
      cache_key:
        description: "Cache key for retrieving pre-downloaded dependencies"
        required: true
        type: string
      scan_enabled:
        description: "Run linting, vuln, config, secret scans, and SBOMs before push"
        required: false
        type: boolean
        default: true
    secrets:
      DEV_API_KEY:
        description: "API key used for Wildfly DEV_MODE"
        required: true
    outputs:
      database_digest:
        value: ${{ jobs.build.outputs.database_digest }}
      wildfly_digest:
        value: ${{ jobs.build.outputs.wildfly_digest }}
      httpd_digest:
        value: ${{ jobs.build.outputs.httpd_digest }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      security-events: write
    outputs:
      database_digest: ${{ steps.push.outputs.database_digest }}
      wildfly_digest: ${{ steps.push.outputs.wildfly_digest }}
      httpd_digest: ${{ steps.push.outputs.httpd_digest }}
    steps:
      - uses: ./.github/actions/setup-aktin

      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          fetch-depth: 1

      - name: Restore cached downloads
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: src/downloads/
          key: ${{ inputs.cache_key }}

      - name: Build images
        working-directory: src
        run: ./build.sh --create-latest
        env:
          DEV_API_KEY: ${{ secrets.DEV_API_KEY }}

      - name: Secrets and config scan
        if: inputs.scan_enabled
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8 # v0.33.1
        with:
          scan-type: fs
          scanners: config,secret
          scan-ref: src/build
          format: sarif
          output: trivy-results.sarif
          exit-code: '0'

      - name: Upload scan results
        if: inputs.scan_enabled
        uses: github/codeql-action/upload-sarif@192325c86100d080feab897ff886c34abd4c83a3 # v3.30.3
        with:
          sarif_file: trivy-results.sarif
          category: static-analysis

      - name: Login to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push and capture digests
        id: push
        run: |
          set -euo pipefail
          for svc in database wildfly httpd; do
            image="ghcr.io/aktin/notaufnahme-dwh-${svc}"
            docker push --all-tags "$image"
            digest=$(docker inspect --format='{{index .RepoDigests 0}}' "$image:latest" | cut -d'@' -f2)
            echo "${svc}_digest=${digest}" >> "$GITHUB_OUTPUT"
          done

      - name: Upload compose artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: compose-yml
          path: src/build/compose.yml
          if-no-files-found: error
          retention-days: 1

  attest-and-scan:
    needs: build
    if: inputs.scan_enabled
    runs-on: ubuntu-latest
    permissions:
      packages: write
      id-token: write
      attestations: write
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - svc: database
            digest: ${{ needs.build.outputs.database_digest }}
          - svc: wildfly
            digest: ${{ needs.build.outputs.wildfly_digest }}
          - svc: httpd
            digest: ${{ needs.build.outputs.httpd_digest }}
    env:
      IMAGE_PREFIX: ghcr.io/aktin/notaufnahme-dwh-
    steps:
      - name: Login to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159 # v3.9.2

      - name: Sign image
        run: cosign sign --yes "${{ env.IMAGE_PREFIX }}${{ matrix.svc }}@${{ matrix.digest }}"

      - name: Generate SBOM
        uses: anchore/sbom-action@da167eac915b4e86f08b264dbdbc867b61be6f0c # v0.20.5
        with:
          image: ${{ env.IMAGE_PREFIX }}${{ matrix.svc }}@${{ matrix.digest }}
          output-file: ${{ matrix.svc }}.sbom.cdx.json

      - name: Attest SBOM
        continue-on-error: true
        run: cosign attest --yes --type cyclonedx --predicate "${{ matrix.svc }}.sbom.cdx.json" "${{ env.IMAGE_PREFIX }}${{ matrix.svc }}@${{ matrix.digest }}"

      - name: Generate and attest build provenance
        continue-on-error: true
        uses: actions/attest-build-provenance@864457a58d4733d7f1574bd8821fa24e02cf7538 # v2.2.0
        with:
          subject-name: ${{ env.IMAGE_PREFIX }}${{ matrix.svc }}
          subject-digest: ${{ matrix.digest }}
          push-to-registry: true

      - name: Vulnerabilities scan
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8 # v0.33.1
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_PREFIX }}${{ matrix.svc }}@${{ matrix.digest }}
          format: sarif
          output: trivy-${{ matrix.svc }}.sarif
          exit-code: 0
          severity: 'HIGH,CRITICAL'

      - name: Upload vulnerabilities scan results
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@192325c86100d080feab897ff886c34abd4c83a3 # v3.30.3
        with:
          sarif_file: trivy-${{ matrix.svc }}.sarif
          category: trivy-${{ matrix.svc }}
