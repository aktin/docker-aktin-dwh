name: Scheduled Base Container Security Updates

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  check-postgres:
    uses: ./.github/workflows/check-container-update.yml
    with:
      container: postgres
      version_key: POSTGRESQL_VERSION

  check-ubuntu:
    uses: ./.github/workflows/check-container-update.yml
    with:
      container: ubuntu
      version_key: UBUNTU_VERSION

  check-php:
    uses: ./.github/workflows/check-container-update.yml
    with:
      container: php
      version_key: APACHE_VERSION

  prepare:
    needs: [ check-postgres, check-ubuntu, check-php ]
    if: |
      needs.check-postgres.outputs.update == 'true' ||
      needs.check-ubuntu.outputs.update == 'true' ||
      needs.check-php.outputs.update == 'true'
    uses: ./.github/workflows/prepare-cache.yml

  build-deploy:
    needs: [ prepare, check-postgres, check-ubuntu, check-php ]
    if: |
      needs.check-postgres.outputs.update == 'true' ||
      needs.check-ubuntu.outputs.update == 'true' ||
      needs.check-php.outputs.update == 'true'
    uses: ./.github/workflows/build-deploy-docker.yml
    with:
      cache_key: ${{ needs.prepare.outputs.cache_key }}
    secrets:
      DEV_API_KEY: ${{ secrets.DEV_API_KEY }}

  commit-digests:
    needs: [ check-postgres, check-ubuntu, check-php, build-deploy ]
    if: |
      needs.build-deploy.result == 'success' && (
        needs.check-postgres.outputs.update == 'true' ||
        needs.check-ubuntu.outputs.update == 'true' ||
        needs.check-php.outputs.update == 'true'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          sparse-checkout: |
            .github
          fetch-depth: 1

      - name: Prepare digest folder
        run: mkdir -p .github/digests

      - name: Download all updated digests
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: digest-*
          path: .github/digests
          merge-multiple: true

      - name: Commit all updated digests
        run: |
          set -euo pipefail
          [[ "$GITHUB_REF" == refs/heads/* ]] || exit 0
          branch="${GITHUB_REF_NAME:-main}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/digests
          git commit -m "chore: update base image digests [skip ci]" || exit 0
          git push origin HEAD:"$branch"
