name: Scheduled Base Container Security Updates

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  prepare:
    uses: ./.github/workflows/prepare-cache.yml

  check-updates:
    strategy:
      matrix:
        include:
          - container: postgres
            key: POSTGRESQL_VERSION
          - container: ubuntu
            key: UBUNTU_VERSION
          - container: php
            key: APACHE_VERSION
    uses: ./.github/workflows/check-container-update.yml
    with:
      container: ${{matrix.container}}
      version_key: ${{matrix.key}}

  build-deploy:
    needs: [ prepare, check-updates ]
    if: contains(needs.check-updates.outputs.*.update, 'true')
    uses: ./.github/workflows/build-deploy-docker.yml
    with:
      cache_key: ${{ needs.prepare.outputs.cache_key }}
    secrets:
      DEV_API_KEY: ${{ secrets.DEV_API_KEY }}

  commit-digests:
    needs: build-deploy
    if: contains(needs.check-updates.outputs.*.update, 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          sparse-checkout: |
            .github
          fetch-depth: 1

      - name: Prepare folder
        run: mkdir -p .github/digests

      - name: Download all updated digests
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: digest-*
          path: .github/digests
          merge-multiple: true

      - name: Commit all updated digests
        shell: bash
        run: |
          set -euo pipefail
          [[ "$GITHUB_REF" == refs/heads/* ]] || exit 0
          BRANCH="${GITHUB_REF_NAME:-main}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/digests
          git commit -m "chore: update base image digests [skip ci]" || exit 0
          git push origin HEAD:"$BRANCH"
